<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control Robot</title>
    <style>
        body { font-family: 'Courier New', monospace; background-color: #121212; color: #00ff00; text-align: center; padding: 20px; }
        h1 { font-size: 1.5rem; text-transform: uppercase; border-bottom: 2px solid #00ff00; display: inline-block; padding-bottom: 5px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 10px; margin-top: 20px; box-shadow: 0 0 10px rgba(0, 255, 0, 0.2); }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 1.2rem;}
        input[type=range] { width: 100%; margin: 10px 0; accent-color: #00ff00; }
        select { width: 100%; padding: 10px; background: #333; color: white; border: 1px solid #00ff00; font-size: 1rem; }
        button { background: #00ff00; color: black; border: none; padding: 15px 30px; font-size: 1.2rem; font-weight: bold; margin-top: 20px; cursor: pointer; width: 100%; border-radius: 5px; }
        button:active { background: #00cc00; transform: scale(0.98); }
        .status { margin-top: 10px; font-size: 0.9rem; color: #888; }
        .blink { animation: blinker 1s linear infinite; color: red; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <h1>Unidad: <span id="robot-id">...</span></h1>
    <div id="connection-status" class="status">Conectando...</div>

    <div class="card">
        <label>⚡ Voltaje Batería: <span id="val-voltaje">12.0</span>V</label>
        <input type="range" id="voltaje" min="10.0" max="14.5" step="0.1" value="12.0" oninput="updateVal('val-voltaje', this.value)">

        <label>🔥 Temp CPU: <span id="val-temp">45</span>°C</label>
        <input type="range" id="temp" min="30" max="90" step="1" value="45" oninput="updateVal('val-temp', this.value)">

        <label>👁️ Visión Computarizada:</label>
        <select id="objeto">
            <option value="nada">Camino Libre</option>
            <option value="persona">⚠️ PERSONA DETECTADA</option>
            <option value="caja">📦 Obstáculo (Caja)</option>
            <option value="fuego">🔥 INCENDIO</option>
        </select>

        <button onclick="enviarDatosManual()">ENVIAR TELEMETRÍA</button>
    </div>

    <script>
        // --- CONFIGURACIÓN ---
        const API_URL = "https://ingesta-robot-beam-6wc63txuza-uc.a.run.app";
        // Generar ID único aleatorio
        const robotId = "R-" + Math.floor(Math.random() * 9000 + 1000);
        document.getElementById('robot-id').innerText = robotId;
        const statusDiv = document.getElementById('connection-status');

        function updateVal(id, val) { document.getElementById(id).innerText = val; }

        async function enviarDatosManual() {
            const data = {
                robot_id: robotId,
                timestamp: new Date().toISOString(),
                bateria: parseFloat(document.getElementById('voltaje').value),
                temp_cpu: parseInt(document.getElementById('temp').value),
                objeto: document.getElementById('objeto').value,
                modo: "manual"
            };

            statusDiv.innerText = "Enviando paquetes...";
            statusDiv.style.color = "yellow";

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                statusDiv.innerText = "✅ Datos recibidos en Nube";
                statusDiv.style.color = "#00ff00";
                
                // Vibración táctil si es celular
                if (navigator.vibrate) navigator.vibrate(50);

            } catch (error) {
                console.error(error);
                statusDiv.innerText = "❌ Error de conexión";
                statusDiv.style.color = "red";
            }
        }

        // OPCIONAL: Enviar "latido" (heartbeat) cada 3 segundos automáticamente
        setInterval(() => {
             // Solo enviamos si no se está enviando manual para no saturar la red del salón
             // Aquí podrías automatizarlo si quieres 'streaming real'
        }, 3000);

    </script>
</body>
</html>
